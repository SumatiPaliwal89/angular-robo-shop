@let hasCartItems = cartItems().length > 0;
<h1 class="header">Your Cart</h1>
@if (hasCartItems){
<button (click)="checkout.scrollIntoView({ behavior: 'smooth' })">Go to Checkout</button>
}
<ul>
  @for (item of groupedCartItems(); track item.product.id) {
  <li>
    <bot-product-details mode="cart" (removeFromCart)="removeFromCart($event)" [product]="item.product" />
    <p class="quantity">Quantity: {{ item.quantity }}</p>
  </li>
  } @empty {
  <h2> Your cart is empty!</h2>
  }
</ul>
<span #checkout>
  @if(hasCartItems){
  <button class='cta'>Checkout</button>
  }
</span>
